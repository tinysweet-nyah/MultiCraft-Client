name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build iOS with Xcode
      run: |
        cd Apple/MultiCraft
        xcodebuild -project MultiCraft.xcodeproj \
                   -scheme MultiCraft \
                   -configuration Release \
                   -sdk iphoneos \
                   -derivedDataPath build \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   ONLY_ACTIVE_ARCH=NO \
                   -destination 'generic/platform=iOS'

    - name: Create IPA
      run: |
        cd Apple/MultiCraft/build/Build/Products/Release-iphoneos
        mkdir -p Payload
        if [ -d MultiCraft.app ]; then
          cp -r MultiCraft.app Payload/
          zip -r MultiCraft.ipa Payload/
        else
          echo "MultiCraft.app not found"
          ls -la
        fi

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: MultiCraft-iOS
        path: Apple/MultiCraft/build/Build/Products/Release-iphoneos/MultiCraft.ipa
        retention-days: 30
      if: hashFiles('Apple/MultiCraft/build/Build/Products/Release-iphoneos/MultiCraft.ipa') != ''
