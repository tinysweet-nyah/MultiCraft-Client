name: Build MultiCraft Windows

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup MSBuild
    uses: microsoft/setup-msbuild@v2

  - name: Setup CMake
    uses: lukka/get-cmake@latest

  - name: Clone vcpkg
    run: git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
    shell: powershell

  - name: Bootstrap vcpkg
    run: $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
    shell: powershell

  - name: Install dependencies
    run: |
      $env:USERPROFILE\vcpkg\vcpkg install zlib sqlite3 curl freetype harfbuzz cairo libpng zstd sdl3 --triplet x64-windows
    shell: powershell

  - name: Configure
    run: >
      cmake -S . -B build
      -G "Visual Studio 17 2022"
      -A x64
      -DCMAKE_TOOLCHAIN_FILE=$env:USERPROFILE\vcpkg\scripts\buildsystems\vcpkg.cmake
      -DVCPKG_TARGET_TRIPLET=x64-windows
      -DENABLE_SOUND=0
      -DENABLE_GETTEXT=0
      -DENABLE_CURSES=0
    shell: powershell

  - name: Build
    run: cmake --build build --config Release
    shell: powershell

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: multicraft-windows
      path: build
```
